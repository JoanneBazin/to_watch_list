name: CI — Validation PR

on:
  pull_request:
    branches: [main]

jobs:
  validation:
    name: Validation PR
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_db
        options: >-
          --health-cmd "pg_isready -U test -d test_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/test_db
      BETTER_AUTH_SECRET: fake-better-auth-secret-key-for-ci-tests-min-32-chars
      BETTER_AUTH_URL: http://localhost:3000
      USE_MOCK_TMDB: "true"
      USE_MOCK_UPLOADTHING: "true"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Sync test DB (Prisma)
        run: npm run test:sync-db:ci

      - name: Run integration tests (Vitest)
        run: npm run test:integration:ci -- --reporter=dot --run

      - name: Build Next.js
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run E2E (Playwright)
        run: npm run test:e2e:ci

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
